server {
    listen 80;
    server_name PANEL_DOMAIN PUBLIC_CONNECT_DOMAIN;

    client_max_body_size 20m;

    location = /maintenance.html {
        root /opt/akfa-vpn/deploy/static;
        add_header Cache-Control "no-store" always;
    }

    location ~ /\.(?:env|git|svn|hg) {
        deny all;
    }

    location ~* \.(?:sqlite|db|dump|sql|bak|backup|tar|tgz|gz|zip|log)$ {
        deny all;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_intercept_errors on;
        error_page 502 503 504 =503 /maintenance.html;
    }
}
