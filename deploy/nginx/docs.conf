server {
    listen 80;
    server_name DOCS_DOMAIN;

    client_max_body_size 200m;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    location ~ /\.(?:env|git|svn|hg) {
        deny all;
    }

    location ~* \.(?:sqlite|db|dump|sql|bak|backup|tar|tgz|gz|zip|log)$ {
        deny all;
    }

    location ^~ /downloads/ {
        alias /opt/akfa-downloads/;
        autoindex off;
        if ($uri ~ "(^|/)\.") { return 404; }
        if ($uri ~* "\.(?:env|db|sqlite|log|bak|backup|sql|dump|pem|key|crt)$") { return 404; }
        try_files $uri =404;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        proxy_pass http://127.0.0.1:6876;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
