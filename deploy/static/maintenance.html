<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>AKFA VPN</title>
  <style>
    :root {
      color-scheme: light;
      --red: #ed1b2f;
      --text: #18181b;
      --muted: #667085;
      --line: #e5e7eb;
      --bg: #f7f7f8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 0%, #fff 0, var(--bg) 62%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
    }
    main {
      width: min(100%, 520px);
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.08);
      padding: clamp(24px, 6vw, 42px);
      text-align: center;
    }
    .brand {
      margin: 0 0 18px;
      color: var(--red);
      font-size: clamp(30px, 9vw, 48px);
      font-weight: 900;
      letter-spacing: 0.02em;
    }
    h1 {
      margin: 0;
      font-size: clamp(22px, 5vw, 30px);
      line-height: 1.15;
    }
    p {
      margin: 14px auto 0;
      max-width: 390px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.65;
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">AKFA VPN</div>
    <h1>Панель временно перезапускается</h1>
    <p>Выполняется автоматическое восстановление сервиса.</p>
    <p>Обычно это занимает 1–2 минуты.</p>
    <p>Обновите страницу чуть позже.</p>
  </main>
</body>
</html>
